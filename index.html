<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Calculatrice</title>
  </head>
  <body>
    <div class="calculator-wrapper">
      <div id="calculatrice" class="shadow-lg">
        <div id="display" class="display-screen">0</div>

        <div class="row g-2 p-3">
          <div class="col-3">
            <button class="btn btn-secondary w-100 btn-calc" data-value="7">
              7
            </button>
          </div>
          <div class="col-3">
            <button class="btn btn-secondary w-100 btn-calc" data-value="8">
              8
            </button>
          </div>
          <div class="col-3">
            <button class="btn btn-secondary w-100 btn-calc" data-value="9">
              9
            </button>
          </div>
          <div class="col-3">
            <button class="btn btn-warning w-100 btn-calc" data-value="/">
              /
            </button>
          </div>

          <div class="col-3">
            <button class="btn btn-secondary w-100 btn-calc" data-value="4">
              4
            </button>
          </div>
          <div class="col-3">
            <button class="btn btn-secondary w-100 btn-calc" data-value="5">
              5
            </button>
          </div>
          <div class="col-3">
            <button class="btn btn-secondary w-100 btn-calc" data-value="6">
              6
            </button>
          </div>
          <div class="col-3">
            <button
              class="btn btn-warning w-100 btn-calc"
              data-value="*"
            ></button>
          </div>

          <div class="col-3">
            <button class="btn btn-secondary w-100 btn-calc" data-value="1">
              1
            </button>
          </div>
          <div class="col-3">
            <button class="btn btn-secondary w-100 btn-calc" data-value="2">
              2
            </button>
          </div>
          <div class="col-3">
            <button class="btn btn-secondary w-100 btn-calc" data-value="3">
              3
            </button>
          </div>
          <div class="col-3">
            <button class="btn btn-warning w-100 btn-calc" data-value="-">
              -
            </button>
          </div>

          <div class="col-3">
            <button class="btn btn-secondary w-100 btn-calc" data-value="0">
              0
            </button>
          </div>
          <div class="col-3">
            <button class="btn btn-secondary w-100 btn-calc" data-value=",">
              ,
            </button>
          </div>
          <div class="col-3">
            <button class="btn btn-danger w-100 btn-calc" id="clearBtn">
              C
            </button>
          </div>
          <div class="col-3">
            <button class="btn btn-warning w-100 btn-calc" data-value="+">
              +
            </button>
          </div>

          <div class="col-12">
            <button class="btn btn-primary w-100 btn-calc" id="equalsBtn">
              =
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
